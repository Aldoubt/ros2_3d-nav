octomap_server:
  ros__parameters:
    resolution: 0.05
    frame_id: odom
    base_frame_id: livox_frame
    sensor_model.max_range: 40.0
    pointcloud_min_z: 0.1
    pointcloud_max_z: 1.0
    occupancy_min_z: 0.1
    occupancy_max_z: 1.0
    filter_speckles: true
    filter_ground: false
    latch: false
